<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Octo Scrape{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #f040a1;
      --accent2: #7c3aed;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
    }

    .nav-brand {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active {
      color: var(--text);
      background: var(--surface2);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; }
    h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-green  { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-red    { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge-gray   { background: rgba(148,163,184,0.1); color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: 0.9; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      text-align: left;
      padding: 0.6rem 1rem;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 0.75rem 1rem; }
    tbody tr:last-child { border-bottom: none; }

    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input[type="number"], input[type="time"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.9rem;
      color: var(--text);
      font-size: 0.9rem;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted);
      top: 3px; left: 3px;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: #fff;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 7px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    .alert-success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }

    .pagination {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.25rem;
      justify-content: center;
    }
    .pagination a, .pagination span {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      font-size: 0.85rem;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .pagination a:hover { color: var(--text); background: var(--surface2); }
    .pagination .current { color: var(--text); background: var(--surface2); font-weight: 600; }

    .stat-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }
    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }

    @media (max-width: 700px) {
      .grid-2 { grid-template-columns: 1fr; }
      .stat-row { flex-wrap: wrap; }
      nav { padding: 0 1rem; gap: 1rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">⚡ Octo Scrape</a>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
    <a href="/schedule" {% if request.url.path == "/schedule" %}class="active"{% endif %}>Schedule</a>
    <a href="/session" {% if request.url.path == "/session" %}class="active"{% endif %}>Session</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
